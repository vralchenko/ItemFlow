name: Keep HF Space Alive

on:
  schedule:
    - cron: "23 */1 * * *" # Every hour at :23
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://vralchenko-itemflow.hf.space/health)
          echo "Health check status: $status"
          if [ "$status" != "200" ]; then
            echo "::warning::Space returned $status"
          fi
